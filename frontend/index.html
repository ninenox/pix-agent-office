<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Agent Office</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header id="header">
    <div class="header-left">
      <div class="logo">🏢</div>
      <div>
        <div class="title">Claude Agent Office</div>
        <div class="subtitle">Pixel Office Dashboard</div>
      </div>
    </div>
    <div class="header-right">
      <span class="status-dot">● ONLINE</span>
      <span id="clock">00:00:00</span>
      <button id="btn-sidebar" onclick="toggleSidebar()">◀ Panel</button>
    </div>
  </header>

  <!-- Main -->
  <div id="main">
    <!-- Canvas Area -->
    <div id="canvas-area">
      <!-- Agent Cards -->
      <div id="agent-cards"></div>
      <!-- Pixel Office Canvas -->
      <div id="canvas-wrap">
        <canvas id="office" width="800" height="560"></canvas>
        <div id="zone-labels"></div>
      </div>

      <!-- Task Dispatch Panel -->
      <div id="task-panel">
        <div id="task-panel-header" onclick="toggleTaskPanel()">
          <div class="task-panel-title">
            <span class="task-panel-icon">⚡</span>
            <span>TASK DISPATCH</span>
            <span id="task-running-badge" class="hidden">● RUNNING</span>
          </div>
          <div id="task-panel-meta">พิมพ์งานแล้วกด DISPATCH</div>
          <button id="task-panel-toggle">▲</button>
        </div>
        <div id="task-panel-body">
          <!-- Mode tabs -->
          <div id="task-mode-tabs">
            <button class="task-tab active" id="tab-manual" onclick="switchMode('manual')">⚙ MANUAL</button>
            <button class="task-tab" id="tab-auto" onclick="switchMode('auto')">✦ AUTO</button>
          </div>

          <!-- MANUAL pane -->
          <div id="mode-manual">
            <div id="task-inputs-grid"></div>
            <div id="task-dispatch-footer">
              <div id="dispatch-feedback"></div>
              <button id="stop-all-btn" onclick="stopAll()">■ STOP ALL</button>
              <button id="dispatch-all-btn" onclick="dispatchAll()">
                <span>🚀</span> DISPATCH ALL
              </button>
            </div>
          </div>

          <!-- AUTO pane -->
          <div id="mode-auto" class="hidden">
            <div id="auto-hint">Boss วิเคราะห์งานและแจกให้ทีมอัตโนมัติ — ทุกคนไปประชุมที่ whiteboard ก่อน</div>
            <textarea id="brainstorm-input"
              placeholder="อธิบายงานที่ต้องการ... Boss จะวิเคราะห์และแบ่งงานให้ทีมเอง"
              onkeydown="handleBrainstormKey(event)"></textarea>
            <div id="auto-footer">
              <div id="brainstorm-feedback"></div>
              <button id="stop-all-btn-auto" onclick="stopAll()">■ STOP ALL</button>
              <button id="brainstorm-btn" onclick="doBrainstorm()">✦ BRAINSTORM</button>
            </div>
            <div id="brainstorm-plan" class="hidden">
              <div id="plan-text"></div>
              <div id="plan-assignments"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar">
      <div id="agent-detail"></div>
      <div class="sidebar-header">📋 ACTIVITY LOG</div>
      <div id="activity-log"></div>
      <div id="quick-actions">
        <div class="sidebar-header">⚡ QUICK ACTIONS</div>
        <div id="action-buttons"></div>
        <div id="action-target">→ All agents</div>
      </div>
    </aside>
  </div>

  <script src="zones.js"></script>
  <script src="agents.js"></script>
  <script src="office.js"></script>
</body>
</html>
